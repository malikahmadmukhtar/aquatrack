<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AquaTrack — Inventory Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" defer></script>
</head>
<body>

  <!-- ========== LOGIN SCREEN ========== -->
  <div id="login-screen" class="login-screen hidden">
    <div class="login-bg"></div>
    <div class="login-card glass-card">
      <div class="login-logo">
        <span class="logo-icon">💧</span>
        <h1 class="logo-text">AquaTrack</h1>
        <p class="login-subtitle">Inventory Management System</p>
      </div>
      <form id="login-form" autocomplete="off">
        <div class="form-group">
          <label for="login-username">Username</label>
          <input type="text" id="login-username" placeholder="Enter your username" required>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Enter your password" required>
        </div>
        <div id="login-error" class="login-error hidden"></div>
        <button type="submit" class="btn btn-gradient btn-full" id="login-btn">
          <span class="btn-text">Sign In</span>
          <span class="btn-loader hidden"></span>
        </button>
      </form>
    </div>
  </div>

  <!-- ========== MAIN APP SHELL ========== -->
  <div id="app-shell" class="app-shell hidden">
    <!-- Mobile Header -->
    <header class="mobile-header">
      <div class="mobile-header-brand">
        <span class="logo-icon-sm">💧</span>
        <span class="sidebar-brand">AquaTrack</span>
      </div>
      <button id="mobile-logout-btn" class="btn-mobile-logout" title="Logout">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </header>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <span class="logo-icon-sm">💧</span>
        <span class="sidebar-brand">AquaTrack</span>
      </div>
      <nav class="sidebar-nav">
        <a href="#inventory" class="nav-item" data-page="inventory">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
          <span>Add Stock</span>
          <div class="nav-indicator"></div>
        </a>
        <a href="#eod" class="nav-item active" data-page="eod">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          <span>End of Day</span>
          <div class="nav-indicator"></div>
        </a>
        <a href="#today" class="nav-item" data-page="today">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
          <span>Today's Metrics</span>
          <div class="nav-indicator"></div>
        </a>
        <a href="#history" class="nav-item" data-page="history">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          <span>History</span>
          <div class="nav-indicator"></div>
        </a>
      </nav>
      <div class="sidebar-footer">
        <button id="logout-btn" class="btn-logout">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          <span>Logout</span>
        </button>
      </div>
    </aside>

    <!-- Main content area -->
    <main id="main-content" class="main-content">
      <div id="page-container" class="page-container"></div>
    </main>
  </div>

  <!-- ========== TOAST CONTAINER ========== -->
  <div id="toast-container" class="toast-container"></div>

  <!-- ========== PERSISTENT ALERT ========== -->
  <div id="persistent-alert" class="persistent-alert hidden">
    <div class="persistent-alert-inner">
      <span class="alert-icon">⚠️</span>
      <div class="alert-content">
        <strong>Low Inventory Alert</strong>
        <p id="alert-metrics-list"></p>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/pages/add-inventory.js"></script>
  <script src="js/pages/eod-update.js"></script>
  <script src="js/pages/todays-metrics.js"></script>
  <script src="js/pages/history.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
